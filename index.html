<!DOCTYPE html>
<html>
    <head>
        <title>Student Management</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h1>Student Management</h1>
        <input id="search-input" placeholder="Search Student">
        <button id="clear-btn">
            Clear
        </button>
        <select id="sort-select">
            <option value="asc">
                A-Z
            </option>
            <option value="desc">
                Z-A
            </option>
        </select>
        <br><br>
        <input id="name-input" placeholder="Name">
        <input id="major-input" placeholder="Major">
        <button id="add-btn">
            Add Student
        </button>
        <p id="loading-message"></p>
        <p id="dashboard"></p>
        <div id="output"></div>
        <button id="prev-btn">
            Previous
        </button>
        <span id="page-number">
            1
        </span>
        <button id="next-btn">
            Next
        </button>
        <script src="ui.js"></script>
        <script src="api.js"></script>
        <script src="app.js"></script>
    </body>
</html>
